# SurveyMAE Main Configuration
# All configuration is separated from code per Document 4

# General Settings
general:
  debug: false
  log_level: INFO

# LLM Configuration (can be overridden by environment variables)
llm:
  provider: qwen
  model: qwen-max
  temperature: 0.2
  max_tokens: 4096
  # api_key is loaded from OPENAI_API_KEY env var

# PDF Parsing Backend Configuration
pdf_parser:
  backend: "marker_api"          # "marker_api" | "pymupdf4llm" | "auto"
  marker_api:
    base_url: "https://www.datalab.to"
    mode: "balanced"             # "fast" | "balanced" | "accurate"
    include_markdown_in_chunks: true
    additional_config:
      keep_pageheader_in_output: false   # 去除页眉，解决问题 A
      keep_pagefooter_in_output: false   # 去除页脚
    max_poll_attempts: 60
    poll_interval_seconds: 2
    request_timeout_seconds: 300
  # PyMuPDF4LLM 兜底配置（v0.2.0+ 支持 Layout 引擎）
  pymupdf4llm:
    use_layout: true             # 启用 PyMuPDF Layout 引擎（推荐）
    show_header: false           # 过滤页眉
    show_footer: false           # 过滤页脚
  cache_dir: "./output/pdf_cache"

# Citation Extraction Configuration
citation:
  # backend: grobid | auto | mupdf
  backend: grobid
  # GROBID service URL (if backend is grobid/auto)
  grobid_url: http://localhost:8070
  grobid_timeout_s: 60        # increased for consolidation
  grobid_consolidate: true    # enable CrossRef DOI completion

# Evidence Collection Configuration
evidence:
  # G4 (Foundational Coverage) related
  foundational_top_k: 30
  foundational_match_threshold: 0.85

  # T-series (Temporal) related
  trend_query_count: 5
  trend_year_range: [2015, 2025]

  # S5 (Section-Cluster Alignment) related
  clustering_algorithm: authority_center # cocitation, louvain, spectral, or authority_center
  #TODO: split algorithm params to here
  clustering_seed: 42

  # C6 (Citation-Sentence Alignment) related
  c6_batch_size: 10                    # Number of sentence-abstract pairs per LLM batch
  c6_model: "qwen3.5-flash"         # Model for C6 batch processing
  c6_max_concurrency: 5              # Max concurrent batches for C6
  contradiction_threshold: 0.05       # Threshold for auto-fail (5%)

  # V2 (Citation-Assertion Alignment) scoring thresholds
  v2_score_5_threshold: 0.01         # <1% -> score 5
  v2_score_4_threshold: 0.02         # 1-2% -> score 4
  v2_score_3_threshold: 0.03         # 2-3% -> score 3
  v2_score_2_threshold: 0.05         # 3-5% -> score 2

  # Sampling related
  citation_sample_size: 15

# Agent Configurations
agents:
  - name: verifier
    system_prompt: config/prompts/verifier.yaml
    tools: []
    retry_attempts: 3
    timeout: 120

  - name: expert
    system_prompt: config/prompts/expert.yaml
    tools: []
    retry_attempts: 3
    timeout: 120

  - name: reader
    system_prompt: config/prompts/reader.yaml
    tools: []
    retry_attempts: 3
    timeout: 120

  - name: corrector
    system_prompt: config/prompts/corrector.yaml
    tools: []
    retry_attempts: 3
    timeout: 120

  - name: reporter
    system_prompt: config/prompts/reporter.yaml
    tools: []
    retry_attempts: 3
    timeout: 120

# MCP Server Configurations
mcp_servers:
  # Local PDF Parser MCP Server
  - name: pdf_parser
    command: uv
    args:
      - run
      - python
      - -m
      - src.tools.pdf_parser_server
    env:
      PYTHONPATH: .

  # Local Citation Checker MCP Server
  - name: citation_checker
    command: uv
    args:
      - run
      - python
      - -m
      - src.tools.citation_checker_server
    env:
      PYTHONPATH: .

  # Example: Remote Tavily Search MCP (uncomment and configure to use)
  # - name: search
  #   url: http://localhost:8000/sse

# Aggregation Configuration (v3)
aggregation:
  weights:
    # VerifierAgent dimensions (factuality, highest priority)
    V1_citation_existence: 1.0
    V2_citation_claim_alignment: 1.0
    V4_internal_consistency: 1.0

    # ExpertAgent dimensions (academic depth)
    E1_foundational_coverage: 1.0
    E2_classification_reasonableness: 1.0
    E3_technical_accuracy: 1.0
    E4_critical_analysis_depth: 1.0

    # ReaderAgent dimensions (readability)
    R1_timeliness: 1.0
    R2_information_balance: 1.0
    R3_structural_clarity: 1.0
    R4_writing_quality: 1.0

# Persistence Configuration (v3)
persistence:
  schema_version: "v3"
  incremental_save: true
  save_tool_artifacts: true

# Report Generation Configuration
report:
  output_dir: ./output
  include_evidence: true
  include_radar: true
  format: markdown
